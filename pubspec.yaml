name: e_kids
description: Ứng dụng học tiếng Anh cho trẻ em Việt Nam
version: 1.0.0+1

environment:
  sdk: ">=3.8.1 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # State & DI
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  equatable: ^2.0.5

  # Backend
  supabase_flutter: ^2.5.6
  dio: ^5.4.3
  connectivity_plus: ^6.0.3

  # Audio & Speech
  flutter_tts: ^4.0.2
  just_audio: ^0.9.39
  speech_to_text: ^7.3.0

  # Navigation
  go_router: ^14.2.7

  # UI
  cached_network_image: ^3.3.1
  lottie: ^3.1.2
  flutter_animate: ^4.5.0
  shimmer: ^3.0.0

  # Local storage
  hive_flutter: ^1.1.0
  shared_preferences: ^2.3.2
  flutter_secure_storage: ^9.2.4

  # Utils
  flutter_dotenv: ^5.1.0
  intl: ^0.19.0
  uuid: ^4.4.2
  string_similarity: ^2.0.0   # dùng cho speak_word quiz

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.12
  riverpod_generator: ^2.4.3
  freezed: ^2.5.2
  json_serializable: ^6.8.0
  hive_generator: ^2.0.1
  mocktail: ^1.0.4
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/animations/
    - .env
  # fonts:
  #   - family: Nunito          # font tròn, thân thiện với trẻ em
  #     fonts:
  #       - asset: assets/fonts/Nunito-Regular.ttf
  #       - asset: assets/fonts/Nunito-SemiBold.ttf
  #         weight: 600
  #       - asset: assets/fonts/Nunito-Bold.ttf
  #         weight: 700